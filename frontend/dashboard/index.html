<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPilot AI - Unified Elite Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #ff007a;
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at bottom left, #121212, #000000);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(90deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* Voice Control Section */
        .voice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.4s;
            margin-bottom: 1rem;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .mic-btn.listening {
            animation: pulse 1.5s infinite;
            background: var(--accent);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 122, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(255, 0, 122, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 122, 0); }
        }

        /* Orchestration Section */
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            color: white;
            outline: none;
        }

        .timeline-item {
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 0.75rem;
            border-left: 3px solid var(--primary);
        }

        /* Analytics Overlay */
        .metrics {
            font-size: 0.85rem;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 4px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NeuroPilot <span style="color: var(--primary);">Unified</span></h1>
            <div id="status-badge" class="card" style="padding: 0.5rem 1rem; border-radius: 12px; font-size: 0.8rem;">
                <span id="status-text">System Standby</span>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Left: Voice Control -->
            <div class="card voice-section">
                <h2>Voice Hub</h2>
                <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 1.5rem;">Hands-free PC Control</p>
                <div class="mic-btn" id="mic-btn">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </div>
                <div id="heard-text" style="font-size: 0.9rem; min-height: 1.2rem; color: var(--primary);"></div>
            </div>

            <!-- Center: Orchestrator -->
            <div class="card">
                <h2>AI Orchestration</h2>
                <div class="input-group" style="margin-top: 1rem;">
                    <input type="text" id="task-input" placeholder="Type a DevOps or System task...">
                    <button id="run-btn" style="background: var(--primary); border: none; padding: 0 1.5rem; border-radius: 16px; font-weight: 700; cursor: pointer;">Run</button>
                </div>
                <div id="timeline" style="max-height: 400px; overflow-y: auto; padding-right: 5px;">
                    <div class="timeline-item">
                        <div style="font-weight: 700; font-size: 0.8rem; color: var(--success);">System Ready</div>
                        <div style="font-size: 0.85rem; opacity: 0.7;">Waiting for orchestration events...</div>
                    </div>
                </div>
            </div>

            <!-- Right: Health & Metrics -->
            <div class="card metrics">
                <h2>Health Metrics</h2>
                <div style="margin-top: 1.5rem;">
                    <div class="metric-row"><span>Agent Latency</span><span id="metric-latency">-- ms</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 20%;"></div></div>
                </div>
                <div style="margin-top: 1.5rem;">
                    <div class="metric-row"><span>Memory Store</span><span id="metric-mem">-- %</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 45%;"></div></div>
                </div>
                <div style="margin-top: 1.5rem;">
                    <div class="metric-row"><span>Security Risk</span><span style="color: var(--success);">Minimal</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: 5%; background: var(--success);"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('mic-btn');
        const heardText = document.getElementById('heard-text');
        const taskInput = document.getElementById('task-input');
        const runBtn = document.getElementById('run-btn');
        const timeline = document.getElementById('timeline');
        const statusText = document.getElementById('status-text');

        let recognition;
        let isListening = false;

        // Initialize Web Speech
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                statusText.innerText = 'Listening...';
            };

            recognition.onend = () => {
                if (isListening) try { recognition.start(); } catch(e) {}
                else {
                    micBtn.classList.remove('listening');
                    statusText.innerText = 'System Standby';
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        const final = event.results[i][0].transcript;
                        executeTask(final);
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                heardText.innerText = interimTranscript;
            };
        }

        micBtn.onclick = () => {
            if (isListening) {
                isListening = false;
                recognition.stop();
            } else {
                recognition.start();
            }
        };

        async function executeTask(task) {
            if (!task) return;
            addTimelineEvent("User Request", task, "var(--primary)");
            
            try {
                const res = await fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task })
                });
                const data = await res.json();
                data.results.forEach(r => {
                    addTimelineEvent(r.agent_name, r.output, "var(--success)");
                });
            } catch (e) {
                addTimelineEvent("Error", e.message, "var(--accent)");
            }
        }

        runBtn.onclick = () => {
            const task = taskInput.value;
            executeTask(task);
            taskInput.value = '';
        };

        function addTimelineEvent(agent, output, color) {
            const item = document.createElement('div');
            item.className = 'timeline-item';
            item.style.borderColor = color;
            item.innerHTML = `
                <div style="font-weight: 700; font-size: 0.8rem; color: ${color};">${agent}</div>
                <div style="font-size: 0.85rem; opacity: 0.8;">${output}</div>
            `;
            timeline.prepend(item);
        }

        // Live metrics polling
        async function updateMetrics() {
            try {
                const res = await fetch('/analytics');
                const data = await res.json();
                document.getElementById('metric-latency').innerText = `${data.avg_latency_ms} ms`;
                document.getElementById('metric-mem').innerText = `${data.memory_percent} %`;
            } catch (e) {}
        }
        setInterval(updateMetrics, 3000);

        // WS Connection
        const ws = new WebSocket(`ws://${window.location.host}/ws/events`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.agent_count) {
                document.getElementById('status-badge').style.borderColor = 'var(--success)';
            }
        };
    </script>
</body>
</html>
