<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxOS - Localhost PC Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.5);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #00ff88;
            --danger: #ff4b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(147, 51, 234, 0.05) 0%, transparent 50%);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            padding: 2rem;
            z-index: 1;
        }

        .control-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .status-display {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .mic-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            position: relative;
        }

        .mic-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.5);
        }

        .mic-button:active {
            transform: scale(0.95);
        }

        .mic-button.listening {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(0, 210, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 210, 255, 0); }
        }

        .mic-button svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        .output-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            max-height: 500px;
        }

        .panel-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-color);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .log-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding-right: 0.5rem;
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 12px;
            border-left: 3px solid var(--accent-color);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry .command {
            font-weight: 600;
            color: var(--accent-color);
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
            display: block;
        }

        .log-entry .result {
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .wake-word-hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            font-style: italic;
        }

        .lock-status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0, 255, 136, 0.1);
            color: var(--success);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .visualizer {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 20px;
            margin-top: 10px;
        }

        .bar {
            width: 3px;
            height: 100%;
            background: var(--accent-color);
            border-radius: 2px;
            animation: quiet 1.2s ease-in-out infinite;
        }

        .bar:nth-child(2) { animation-delay: 0.1s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.3s; }
        .bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes quiet {
            0%, 100% { height: 5px; }
            50% { height: 20px; }
        }

        .listening .bar {
            animation: noise 0.5s ease-in-out infinite;
        }

        @keyframes noise {
            0%, 100% { height: 5px; }
            50% { height: 35px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="control-panel">
            <div class="logo">VoxOS</div>
            <div class="status-display">
                <div class="status-indicator" id="status-dot"></div>
                <span id="status-text">System Online</span>
            </div>
            
            <button class="mic-button" id="mic-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>

            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <div class="wake-word-hint">Say "VoxOS" or "Jarvis" followed by your command</div>
        </div>

        <div class="output-panel">
            <div class="panel-header">
                <span>Output Log</span>
                <span class="lock-status" id="lock-status">Unlocked</span>
            </div>
            <div class="log-container" id="log-container">
                <div class="log-entry">
                    <span class="command">System</span>
                    <span class="result">Welcome to VoxOS Pro. Analytics and Prediction Engine online.</span>
                </div>
            </div>

            <!-- Prediction Section -->
            <div class="prediction-section" id="prediction-section" style="display:none; margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                <div style="font-size: 0.75rem; color: var(--accent-color); margin-bottom: 0.5rem; text-transform: uppercase;">Suggested next steps</div>
                <div id="prediction-chips" style="display: flex; gap: 0.5rem; flex-wrap: wrap;"></div>
            </div>
        </div>
    </div>

    <!-- Analytics Dashboard Overlay -->
    <div style="position: fixed; bottom: 20px; left: 20px; background: var(--card-bg); backdrop-filter: blur(10px); padding: 1rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; z-index: 100; width: 220px;">
        <div style="font-weight: 600; margin-bottom: 0.5rem; color: var(--accent-color);">Performance Analytics</div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.25rem;">
            <span>Latency</span>
            <span id="metric-latency">-- ms</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.25rem;">
            <span>CPU</span>
            <span id="metric-cpu">-- %</span>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <span>Memory</span>
            <span id="metric-mem">-- %</span>
        </div>
        <div style="margin-top: 0.5rem; font-size: 0.7rem; color: var(--success); display: flex; align-items: center; gap: 4px;">
            <div style="width: 6px; height: 6px; background: var(--success); border-radius: 50%;"></div>
            System Health: Optimized
        </div>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
